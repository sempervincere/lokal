<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOKAL AI — F&B Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="lokal/data.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#FDFBF7;overflow-x:hidden;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#E5E1DC;border-radius:9999px;}
  ::-webkit-scrollbar-thumb:hover{background:#CCC8C2;}
  @keyframes heroPulse{0%,100%{transform:scale(1) translate(0,0);opacity:0.6;}50%{transform:scale(1.08) translate(12px,-16px);opacity:0.9;}}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  input::placeholder,textarea::placeholder{color:#6B6560;}
  textarea{font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
  button{font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
  *{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
</style>
</head>
<body>
<div id="root"></div>

<script src="lokal/ui.jsx" type="text/babel"></script>
<script src="lokal/landing.jsx" type="text/babel"></script>
<script src="lokal/auth.jsx" type="text/babel"></script>
<script src="lokal/dashboard-bo.jsx" type="text/babel"></script>
<script src="lokal/dashboard-co.jsx" type="text/babel"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "startScreen": "dashboard-co",
  "defaultLang": "id"
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen] = useState(() => {
    // Always start fresh on landing to avoid stale state crashes
    return TWEAK_DEFAULTS.startScreen;
  });
  const [lang, setLang] = useState(() => {
    return localStorage.getItem('lokal_lang') || TWEAK_DEFAULTS.defaultLang;
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { localStorage.setItem('lokal_screen_v2', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('lokal_lang', lang); }, [lang]);

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const goTo = (s) => setScreen(s);
  const logout = () => { localStorage.removeItem('lokal_bo_page'); localStorage.removeItem('lokal_co_page'); setScreen('landing'); };

  const setTweak = (key, val) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  return (
    <>
      {screen === 'landing' && (
        <LandingPage
          lang={lang} setLang={setLang}
          onLogin={() => goTo('auth')}
        />
      )}
      {screen === 'auth' && (
        <AuthPage
          lang={lang}
          onEnterBO={() => goTo('dashboard-bo')}
          onEnterCO={() => goTo('dashboard-co')}
        />
      )}
      {screen === 'dashboard-bo' && (
        <BODashboard
          lang={lang} setLang={setLang}
          onLogout={logout}
        />
      )}
      {screen === 'dashboard-co' && (
        <CODashboard
          lang={lang} setLang={setLang}
          onLogout={logout}
        />
      )}

      {/* Tweaks Panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, width: 260, background: '#fff',
          borderRadius: 16, boxShadow: '0 8px 32px rgba(0,0,0,0.14)', padding: '18px',
          border: '1px solid #F5F1EC', zIndex: 9999, fontFamily: "'Plus Jakarta Sans', sans-serif",
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#1A1A1A', marginBottom: 16 }}>Tweaks</div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {/* Screen jump */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#6B6560', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Jump to Screen</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                {[
                  { id: 'landing', label: '① Landing Page' },
                  { id: 'auth', label: '② Auth / Login' },
                  { id: 'dashboard-bo', label: '③ Business Owner' },
                  { id: 'dashboard-co', label: '④ Cluster Owner' },
                ].map(s => (
                  <button key={s.id} onClick={() => { goTo(s.id); setTweak('startScreen', s.id); }} style={{
                    padding: '8px 12px', borderRadius: 8,
                    border: `1px solid ${screen === s.id ? '#1B7A65' : '#F5F1EC'}`,
                    background: screen === s.id ? '#E6F3EF' : '#FDFBF7',
                    fontSize: 12, fontWeight: screen === s.id ? 600 : 400,
                    color: screen === s.id ? '#1B7A65' : '#4A4540',
                    cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit',
                  }}>{s.label}</button>
                ))}
              </div>
            </div>

            {/* Language */}
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#6B6560', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Language</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[{ id: 'id', label: '🇮🇩 Indonesia' }, { id: 'en', label: '🇬🇧 English' }].map(l => (
                  <button key={l.id} onClick={() => { setLang(l.id); setTweak('defaultLang', l.id); }} style={{
                    flex: 1, padding: '8px', borderRadius: 8,
                    border: `1.5px solid ${lang === l.id ? '#1B7A65' : '#F5F1EC'}`,
                    background: lang === l.id ? '#E6F3EF' : '#FDFBF7',
                    fontSize: 11, fontWeight: 600,
                    color: lang === l.id ? '#1B7A65' : '#6B6560',
                    cursor: 'pointer', fontFamily: 'inherit',
                  }}>{l.label}</button>
                ))}
              </div>
            </div>

            {/* BO Dashboard quick nav */}
            {screen === 'dashboard-bo' && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: '#6B6560', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>BO Pages</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                  {['overview','clusters','history','subscription'].map(p => (
                    <button key={p} onClick={() => { localStorage.setItem('lokal_bo_page', p); setScreen('landing'); setTimeout(() => setScreen('dashboard-bo'), 50); }} style={{
                      padding: '7px 12px', borderRadius: 8, border: '1px solid #F5F1EC', background: '#FDFBF7',
                      fontSize: 12, color: '#4A4540', cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit', textTransform: 'capitalize',
                    }}>{p}</button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
